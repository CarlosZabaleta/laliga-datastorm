name: La Liga DataStorm — Daily Data Fetch

on:
  schedule:
    - cron: "0 9 * * *"   # 06:00 AM Argentina (UTC-3)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r automation/requirements.txt

      - name: Fetch data
        run: python automation/fetch_data.py

      - name: Commit & push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/
          git diff --cached --quiet || git commit -m "data: update $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push

      - name: Deploy data to Hostinger (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_HOST }}
          username:   ${{ secrets.FTP_USER }}
          password:   ${{ secrets.FTP_PASSWORD }}
          local-dir:  ./web/data/
          server-dir: /public_html/data/
          exclude: |
            **/.git*
            **/.git*/**
