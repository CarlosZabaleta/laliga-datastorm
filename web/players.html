<script>
const DEMO=[
  {name:'Kylian Mbappé',team:'Real Madrid',goals:28,assists:9,games:32,rating:'8.5'},
  {name:'Robert Lewandowski',team:'FC Barcelona',goals:24,assists:5,games:30,rating:'8.1'},
  {name:'Vinícius Jr.',team:'Real Madrid',goals:18,assists:12,games:31,rating:'8.3'},
  {name:'Antoine Griezmann',team:'Atlético',goals:16,assists:7,games:29,rating:'7.9'},
  {name:'Jude Bellingham',team:'Real Madrid',goals:14,assists:8,games:27,rating:'8.2'},
  {name:'Pedri',team:'FC Barcelona',goals:8,assists:14,games:28,rating:'8.0'},
  {name:'Álvaro Morata',team:'Atlético',goals:13,assists:4,games:30,rating:'7.5'},
  {name:'Ferran Torres',team:'FC Barcelona',goals:10,assists:6,games:25,rating:'7.3'},
  {name:'Isco',team:'Real Betis',goals:9,assists:11,games:31,rating:'7.7'},
  {name:'Artem Dovbyk',team:'Girona',goals:12,assists:3,games:28,rating:'7.4'},
  {name:'Mikel Oyarzabal',team:'Real Sociedad',goals:11,assists:5,games:27,rating:'7.6'},
  {name:'Alexander Sørloth',team:'Villarreal',goals:10,assists:4,games:29,rating:'7.3'},
  {name:'Borja Iglesias',team:'Real Betis',goals:9,assists:3,games:26,rating:'7.2'},
  {name:'Samu Omorodion',team:'Atlético',goals:8,assists:2,games:24,rating:'7.1'},
  {name:'Iago Aspas',team:'Celta de Vigo',goals:11,assists:7,games:32,rating:'7.8'},
  {name:'Dani Olmo',team:'FC Barcelona',goals:7,assists:9,games:22,rating:'7.9'},
  {name:'Raphinha',team:'FC Barcelona',goals:9,assists:10,games:30,rating:'7.7'},
  {name:'Rodrygo',team:'Real Madrid',goals:10,assists:6,games:29,rating:'7.6'},
  {name:'Lamine Yamal',team:'FC Barcelona',goals:8,assists:13,games:31,rating:'8.1'},
  {name:'Dani Carvajal',team:'Real Madrid',goals:3,assists:6,games:18,rating:'7.4'},
  {name:'Antonio Rüdiger',team:'Real Madrid',goals:2,assists:1,games:28,rating:'7.3'},
  {name:'Gavi',team:'FC Barcelona',goals:4,assists:8,games:19,rating:'7.5'},
  {name:'Frenkie de Jong',team:'FC Barcelona',goals:3,assists:7,games:21,rating:'7.4'},
  {name:'Marcos Llorente',team:'Atlético',goals:5,assists:9,games:28,rating:'7.3'},
  {name:'Yannick Carrasco',team:'Atlético',goals:6,assists:5,games:25,rating:'7.2'},
  {name:'Giorgi Mamardashvili',team:'Valencia',goals:0,assists:0,games:34,rating:'7.6'},
  {name:'David Raya',team:'Arsenal/Barca',goals:0,assists:0,games:30,rating:'7.5'},
  {name:'Unai Simón',team:'Athletic Club',goals:0,assists:0,games:33,rating:'7.4'},
  {name:'Alejandro Balde',team:'FC Barcelona',goals:2,assists:8,games:29,rating:'7.3'},
  {name:'Fran García',team:'Real Madrid',goals:1,assists:5,games:26,rating:'7.1'},
];
let allPlayers=[],currentStat='goals',sortDir='desc',searchQ='';
const rClass=r=>{const n=parseFloat(r)||0;return n>=8?'rating-high':n>=7?'rating-mid':'rating-low'};
const formDots=f=>{if(!f)return'<span style="color:var(--muted);font-size:.7rem">—</span>';return'<div class="form-dots">'+f.slice(-5).split('').map(c=>`<div class="form-dot ${c==='W'?'fw':c==='D'?'fd':'fl'}"></div>`).join('')+'</div>'};
function render(){
  let src=[...allPlayers];
  if(searchQ)src=src.filter(p=>p.name.toLowerCase().includes(searchQ));
  src.sort((a,b)=>{const av=parseFloat(a[currentStat])||0,bv=parseFloat(b[currentStat])||0;return sortDir==='desc'?bv-av:av-bv});
  document.getElementById('count-badge').textContent=`${src.length} jugadores`;
  const tbody=document.getElementById('players-tbody');
  tbody.innerHTML=src.map((p,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const rat=p.rating?parseFloat(p.rating).toFixed(1):'—';
    return`<tr>
      <td class="rank-cell ${rc}">${i+1}</td>
      <td><div class="player-cell">${p.photo?`<img class="player-photo" src="${p.photo}" alt="${p.name}">`:'<div class="player-photo-placeholder">⭐</div>'}<div><div class="pname">${p.name}</div><div class="pclub">${p.team||''}</div></div></div></td>
      <td class="${currentStat==='goals'?'stat-main':'stat-sec'}">${p.goals??0}</td>
      <td class="${currentStat==='assists'?'stat-main':'stat-sec'}">${p.assists??0}</td>
      <td class="stat-sec">${p.games??0}</td>
      <td><span class="rating-badge ${rClass(rat)}">${rat}</span></td>
      <td>${formDots(p.form)}</td>
    </tr>`;
  }).join('')||'<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--muted)">Sin resultados.</td></tr>';
}
function updateHeaders(){
  document.querySelectorAll('.players-table th[data-col]').forEach(th=>{
    const col=th.dataset.col;
    th.classList.toggle('sorted',col===currentStat);
    th.querySelector('.sort-arrow').textContent=col===currentStat?(sortDir==='desc'?'↓':'↑'):'↕';
  });
}
document.getElementById('search').addEventListener('input',e=>{searchQ=e.target.value.toLowerCase();render()});
document.getElementById('sort-dir').addEventListener('change',e=>{sortDir=e.target.value;render()});
document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  currentStat=btn.dataset.stat;updateHeaders();render();
}));
document.querySelectorAll('.players-table th[data-col]').forEach(th=>th.addEventListener('click',()=>{
  const col=th.dataset.col;
  if(currentStat===col)sortDir=sortDir==='desc'?'asc':'desc';else{currentStat=col;sortDir='desc';}
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.stat===col));
  updateHeaders();render();
}));
async function init(){
  try{
    const[sc,as]=await Promise.all([
      fetch('data/scorers.json').then(r=>r.ok?r.json():null).catch(()=>null),
      fetch('data/assisters.json').then(r=>r.ok?r.json():null).catch(()=>null),
    ]);
    if(sc&&sc.players&&sc.players.length){
      const byName={};
      (sc.players||[]).forEach(p=>byName[p.name]={...p});
      (as&&as.players||[]).forEach(p=>{if(byName[p.name])byName[p.name].assists=p.assists;else byName[p.name]={...p}});
      allPlayers=Object.values(byName);
    }else{allPlayers=DEMO}
  }catch(e){allPlayers=DEMO}
  render();updateHeaders();
}
init();
</script>

    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
